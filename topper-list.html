<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon | M.M Public School Mundeshwari</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#ffffff;
overflow:hidden;
}

.container{
text-align:center;
padding:30px;
max-width:480px;
width:100%;
}

.logo{
width:120px;
height:120px;
border-radius:50%;
overflow:hidden;
margin:0 auto 25px;
border:4px solid #0a2a66;
box-shadow:0 15px 35px rgba(10,42,102,0.25);
animation:float 3s ease-in-out infinite;
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-8px);}
}

h1{
font-size:30px;
color:#0a2a66;
font-weight:900;
margin-bottom:10px;
letter-spacing:1px;
}

.subtitle{
font-size:14px;
color:#555;
margin-bottom:30px;
line-height:1.6;
}

.progress-box{
width:100%;
height:10px;
background:#e6ecf5;
border-radius:20px;
overflow:hidden;
margin-bottom:25px;
}

.progress{
height:100%;
width:65%;
background:linear-gradient(90deg,#0a2a66,#1e4b8f);
animation:progressMove 2s ease-in-out infinite alternate;
}

@keyframes progressMove{
from{width:55%;}
to{width:75%;}
}

.btn{
display:inline-block;
padding:13px 28px;
background:linear-gradient(135deg,#0a2a66,#1e4b8f);
color:white;
border-radius:40px;
text-decoration:none;
font-weight:700;
font-size:14px;
transition:0.2s;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(10,42,102,0.35);
}

.footer{
position:absolute;
bottom:15px;
width:100%;
text-align:center;
font-size:12px;
color:#777;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="logo.png" alt="School Logo" onerror="this.src='https://via.placeholder.com/120'">
</div>

<h1>Coming Soon</h1>

<div class="subtitle">
This feature is currently under development.<br>
It will be available very soon. 🚀
</div>

<div class="progress-box">
<div class="progress"></div>
</div>

<a href="index.html" class="btn">
<i class="fa-solid fa-arrow-left"></i> Back to Home
</a>

</div>

<div class="footer">
© 2026 M.M Public School Mundeshwari
</div>

</body>
</html>
