<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Test Leaderboard System</title>

<style>
/* ===== MODERN RESET ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
}

body {
    background: linear-gradient(145deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding-bottom: 30px;
}

/* ===== HEADER ===== */
.header {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    color: #fff;
    padding: 24px 20px;
    text-align: center;
    font-weight: 600;
    font-size: 24px;
    letter-spacing: 1px;
    position: sticky;
    top: 0;
    z-index: 100;
    text-transform: uppercase;
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
}

/* ===== MAIN CONTAINER ===== */
.container {
    max-width: 800px;
    margin: 24px auto;
    padding: 0 20px;
}

/* ===== TEST LIST CARD ===== */
.test-card {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(5px);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.3);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    border: 1px solid rgba(255, 255, 255, 0.3);
    position: relative;
    animation: slideIn 0.5s ease forwards;
    opacity: 0;
    transform: translateX(-20px);
}

.test-card:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 30px 45px -10px rgba(0, 0, 0, 0.4);
    background: rgba(255, 255, 255, 0.98);
}

.test-card:active {
    transform: scale(0.98);
}

.test-id {
    display: inline-block;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    padding: 6px 16px;
    border-radius: 40px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.3px;
    margin-bottom: 12px;
    box-shadow: 0 4px 10px rgba(102, 126, 234, 0.4);
}

.test-title {
    font-size: 20px;
    font-weight: 600;
    color: #1e293b;
    margin-bottom: 12px;
    line-height: 1.4;
}

.test-meta {
    display: flex;
    gap: 24px;
    color: #475569;
    font-size: 14px;
    font-weight: 500;
}

.test-meta span {
    display: flex;
    align-items: center;
    gap: 8px;
}

/* ===== LEADERBOARD CARD ===== */
.leaderboard-card {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(5px);
    border-radius: 20px;
    padding: 16px 22px;
    margin-bottom: 12px;
    box-shadow: 0 15px 30px -8px rgba(0, 0, 0, 0.3);
    display: flex;
    align-items: center;
    gap: 16px;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    animation: cardPop 0.6s ease forwards;
    opacity: 0;
    transform: scale(0.95);
    border: 1px solid rgba(255, 255, 255, 0.3);
    cursor: pointer;
    position: relative;
    overflow: hidden;
}

.leaderboard-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #667eea, #764ba2, #fbbf24);
    transform: translateX(-100%);
    transition: transform 0.6s ease;
}

.leaderboard-card:hover::before {
    transform: translateX(0);
}

.leaderboard-card:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 30px 40px -12px rgba(0, 0, 0, 0.4);
    background: rgba(255, 255, 255, 0.98);
}

.leaderboard-card:active {
    transform: scale(0.98);
}

/* Click indicator animation */
.leaderboard-card::after {
    content: 'Click for profile';
    position: absolute;
    bottom: 8px;
    right: 20px;
    font-size: 11px;
    color: #94a3b8;
    opacity: 0;
    transition: opacity 0.3s ease;
    font-weight: 500;
    letter-spacing: 0.3px;
}

.leaderboard-card:hover::after {
    opacity: 0.7;
}

/* Rank Badge */
.rank-badge {
    width: 50px;
    height: 50px;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 20px;
    background: #f1f5f9;
    color: #1e293b;
    box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.05);
    border: 2px solid transparent;
    transition: all 0.3s ease;
}

.rank-badge.rank-1 {
    background: linear-gradient(135deg, #fbbf24, #f59e0b);
    color: #78350f;
    border-color: #fbbf24;
    box-shadow: 0 10px 20px -8px #fbbf24;
}

.rank-badge.rank-2 {
    background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
    color: #334155;
    border-color: #94a3b8;
    box-shadow: 0 10px 20px -8px #94a3b8;
}

.rank-badge.rank-3 {
    background: linear-gradient(135deg, #fed7aa, #fdba74);
    color: #7b341e;
    border-color: #f97316;
    box-shadow: 0 10px 20px -8px #f97316;
}

/* User Info */
.user-info {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 16px;
}

.user-avatar {
    width: 56px;
    height: 56px;
    border-radius: 20px;
    object-fit: cover;
    border: 3px solid #fff;
    box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.3);
    background: #f1f5f9;
    transition: transform 0.3s ease;
}

.leaderboard-card:hover .user-avatar {
    transform: scale(1.1);
}

.user-details {
    flex: 1;
}

.user-name {
    font-weight: 600;
    color: #1e293b;
    font-size: 18px;
    margin-bottom: 6px;
    letter-spacing: -0.2px;
}

.score-details {
    display: flex;
    gap: 12px;
    color: #475569;
    font-size: 14px;
    font-weight: 500;
}

.score-item {
    display: flex;
    align-items: center;
    gap: 4px;
    background: #f1f5f9;
    padding: 4px 12px;
    border-radius: 30px;
}

.score-value {
    font-weight: 700;
    color: #667eea;
}

/* Time Badge */
.time-badge {
    background: #f1f5f9;
    color: #dc2626;
    padding: 8px 16px;
    border-radius: 40px;
    font-weight: 600;
    font-size: 15px;
    font-family: 'Roboto Mono', monospace;
    letter-spacing: 0.5px;
    box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.05);
    border: 1px solid #e2e8f0;
    white-space: nowrap;
}

/* ===== PROFILE MODAL ===== */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(8px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    animation: fadeIn 0.3s ease;
}

.modal-content {
    background: white;
    width: 90%;
    max-width: 400px;
    border-radius: 32px;
    padding: 30px;
    box-shadow: 0 40px 60px -15px rgba(0, 0, 0, 0.4);
    animation: modalPop 0.5s ease;
    border: 1px solid rgba(255, 255, 255, 0.2);
}

.modal-close {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #f1f5f9;
    border: none;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #64748b;
    transition: all 0.3s ease;
}

.modal-close:hover {
    background: #fee2e2;
    color: #dc2626;
    transform: rotate(90deg);
}

.profile-header {
    text-align: center;
    margin-bottom: 25px;
}

.profile-avatar {
    width: 100px;
    height: 100px;
    border-radius: 30px;
    object-fit: cover;
    border: 4px solid #fff;
    box-shadow: 0 20px 30px -10px rgba(102, 126, 234, 0.4);
    margin-bottom: 15px;
}

.profile-name {
    font-size: 24px;
    font-weight: 700;
    color: #1e293b;
    margin-bottom: 5px;
}

.profile-id {
    color: #64748b;
    font-size: 14px;
    background: #f1f5f9;
    display: inline-block;
    padding: 4px 16px;
    border-radius: 40px;
}

.profile-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin: 25px 0;
    padding: 20px 0;
    border-top: 2px dashed #e2e8f0;
    border-bottom: 2px dashed #e2e8f0;
}

.profile-stat-item {
    text-align: center;
}

.profile-stat-value {
    font-size: 24px;
    font-weight: 700;
    color: #667eea;
    margin-bottom: 5px;
}

.profile-stat-label {
    font-size: 12px;
    color: #64748b;
    font-weight: 500;
}

.profile-detail {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    background: #f8fafc;
    border-radius: 16px;
    margin-bottom: 10px;
}

.profile-detail-icon {
    width: 40px;
    height: 40px;
    background: #e0e7ff;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #667eea;
    font-size: 18px;
}

.profile-detail-content {
    flex: 1;
}

.profile-detail-label {
    font-size: 12px;
    color: #64748b;
    margin-bottom: 2px;
}

.profile-detail-value {
    font-weight: 600;
    color: #1e293b;
    font-size: 15px;
}

/* ===== BACK BUTTON ===== */
.back-btn {
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(5px);
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 16px;
    padding: 16px 24px;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 24px;
    width: 100%;
    box-shadow: 0 15px 25px -8px rgba(0, 0, 0, 0.3);
    letter-spacing: 0.5px;
}

.back-btn:hover {
    background: rgba(255, 255, 255, 0.3);
    transform: translateY(-3px);
    box-shadow: 0 20px 30px -8px rgba(0, 0, 0, 0.4);
}

.back-btn:active {
    transform: translateY(0);
}

/* ===== LOADING SCREEN ===== */
.loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(8px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    animation: fadeIn 0.3s ease;
}

.loading-content {
    background: white;
    width: 90%;
    max-width: 340px;
    border-radius: 32px;
    padding: 40px 28px;
    text-align: center;
    box-shadow: 0 40px 60px -15px rgba(0, 0, 0, 0.4);
    animation: scaleIn 0.4s ease;
}

.loading-spinner {
    width: 60px;
    height: 60px;
    border: 3px solid #f1f5f9;
    border-top: 3px solid #667eea;
    border-radius: 50%;
    margin: 0 auto 24px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.loading-title {
    font-size: 22px;
    font-weight: 600;
    color: #1e293b;
    margin-bottom: 8px;
}

.loading-text {
    color: #64748b;
    font-size: 15px;
}

/* ===== EMPTY STATE ===== */
.empty-state {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(5px);
    border-radius: 28px;
    padding: 60px 24px;
    text-align: center;
    color: #64748b;
    box-shadow: 0 30px 40px -12px rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.3);
}

.empty-state h3 {
    font-size: 20px;
    font-weight: 600;
    color: #1e293b;
    margin-bottom: 8px;
}

/* ===== ANIMATIONS ===== */
@keyframes slideIn {
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

@keyframes cardPop {
    0% {
        opacity: 0;
        transform: scale(0.9);
    }
    50% {
        transform: scale(1.02);
    }
    100% {
        opacity: 1;
        transform: scale(1);
    }
}

@keyframes modalPop {
    0% {
        opacity: 0;
        transform: scale(0.8) translateY(20px);
    }
    100% {
        opacity: 1;
        transform: scale(1) translateY(0);
    }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes scaleIn {
    from {
        transform: scale(0.9);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

/* Animation Delays */
.test-card:nth-child(1) { animation-delay: 0.1s; }
.test-card:nth-child(2) { animation-delay: 0.15s; }
.test-card:nth-child(3) { animation-delay: 0.2s; }
.test-card:nth-child(4) { animation-delay: 0.25s; }
.test-card:nth-child(5) { animation-delay: 0.3s; }

.leaderboard-card:nth-child(1) { animation-delay: 0.1s; }
.leaderboard-card:nth-child(2) { animation-delay: 0.15s; }
.leaderboard-card:nth-child(3) { animation-delay: 0.2s; }
.leaderboard-card:nth-child(4) { animation-delay: 0.25s; }
.leaderboard-card:nth-child(5) { animation-delay: 0.3s; }
.leaderboard-card:nth-child(6) { animation-delay: 0.35s; }
.leaderboard-card:nth-child(7) { animation-delay: 0.4s; }
.leaderboard-card:nth-child(8) { animation-delay: 0.45s; }
.leaderboard-card:nth-child(9) { animation-delay: 0.5s; }
.leaderboard-card:nth-child(10) { animation-delay: 0.55s; }

/* ===== RESPONSIVE ===== */
@media (max-width: 640px) {
    .container {
        padding: 0 16px;
    }
    
    .header {
        font-size: 22px;
        padding: 20px;
    }
    
    .leaderboard-card {
        padding: 14px 18px;
    }
    
    .rank-badge {
        width: 45px;
        height: 45px;
        font-size: 18px;
        border-radius: 16px;
    }
    
    .user-avatar {
        width: 50px;
        height: 50px;
        border-radius: 18px;
    }
    
    .user-name {
        font-size: 16px;
    }
    
    .score-details {
        flex-direction: column;
        gap: 4px;
    }
    
    .time-badge {
        padding: 6px 12px;
        font-size: 13px;
    }
    
    .profile-avatar {
        width: 80px;
        height: 80px;
    }
    
    .profile-name {
        font-size: 20px;
    }
}
</style>
</head>

<body>

<div class="header">
    LEADERBOARD
</div>

<div class="container">
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-title">Loading...</div>
            <div class="loading-text">Please wait while we fetch the results</div>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profileModal" class="modal-overlay">
        <div class="modal-content" id="modalContent">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- Test List -->
    <div id="list"></div>
    
    <!-- Leaderboard Area -->
    <div id="board"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-database.js";

const app = initializeApp({
    apiKey: "AIzaSyCy1r8BXbe-W9UBsCrFDFgkHy-j7lYFwYg",
    databaseURL: "https://mmpublicschoolmundeshwar-233a4-default-rtdb.firebaseio.com"
});

const db = getDatabase(app);

const listDiv = document.getElementById("list");
const boardDiv = document.getElementById("board");
const loadingOverlay = document.getElementById("loadingOverlay");
const profileModal = document.getElementById("profileModal");
const modalBody = document.getElementById("modalBody");

let currentTestId = '';
let allParticipants = [];

// Format time function
function formatTime(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;
}

// Loading functions
function showLoading() {
    loadingOverlay.style.display = 'flex';
}

function hideLoading() {
    loadingOverlay.style.display = 'none';
}

// Modal functions
window.showProfile = (uid) => {
    const participant = allParticipants.find(p => p.uid === uid);
    if (!participant) return;
    
    const user = participant.userData;
    const rank = participant.rank;
    const score = participant.score;
    const total = participant.total;
    const time = participant.time;
    const percentage = Math.round((score / total) * 100);
    
    let rankText = `${rank}`;
    if (rank === 1) rankText = '1st';
    else if (rank === 2) rankText = '2nd';
    else if (rank === 3) rankText = '3rd';
    else rankText = `${rank}th`;
    
    modalBody.innerHTML = `
        <div class="profile-header">
            <img src="${user.photo}" class="profile-avatar" alt="${user.username}">
            <div class="profile-name">${user.username}</div>
            <div class="profile-id">Rank: ${rankText}</div>
        </div>
        
        <div class="profile-stats">
            <div class="profile-stat-item">
                <div class="profile-stat-value">${score}/${total}</div>
                <div class="profile-stat-label">Score</div>
            </div>
            <div class="profile-stat-item">
                <div class="profile-stat-value">${percentage}%</div>
                <div class="profile-stat-label">Accuracy</div>
            </div>
            <div class="profile-stat-item">
                <div class="profile-stat-value">${formatTime(time)}</div>
                <div class="profile-stat-label">Time</div>
            </div>
        </div>
        
        <div class="profile-detail">
            <div class="profile-detail-icon">📊</div>
            <div class="profile-detail-content">
                <div class="profile-detail-label">Correct Answers</div>
                <div class="profile-detail-value">${score} out of ${total}</div>
            </div>
        </div>
        
        <div class="profile-detail">
            <div class="profile-detail-icon">⏱️</div>
            <div class="profile-detail-content">
                <div class="profile-detail-label">Completion Time</div>
                <div class="profile-detail-value">${formatTime(time)}</div>
            </div>
        </div>
        
        <div class="profile-detail">
            <div class="profile-detail-icon">🎯</div>
            <div class="profile-detail-content">
                <div class="profile-detail-label">Accuracy</div>
                <div class="profile-detail-value">${percentage}%</div>
            </div>
        </div>
    `;
    
    profileModal.style.display = 'flex';
};

window.closeModal = () => {
    profileModal.style.display = 'none';
};

// Close modal when clicking outside
profileModal.addEventListener('click', (e) => {
    if (e.target === profileModal) {
        closeModal();
    }
});

// Format date
function formatDate(timestamp) {
    const date = new Date(timestamp);
    return date.toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'short',
        day: 'numeric'
    });
}

// Load all test history
showLoading();
const snap = await get(ref(db, "onlineTest/history"));
hideLoading();

if (!snap.exists()) {
    listDiv.innerHTML = `
        <div class="empty-state">
            <h3>No Tests Available</h3>
            <p>Please wait for admin to upload tests</p>
        </div>
    `;
    throw new Error("No tests");
}

Object.entries(snap.val()).reverse().forEach(([key, d]) => {
    const date = formatDate(d.startTime);
    listDiv.innerHTML += `
        <div class="test-card" onclick="openBoard('${d.testId}')">
            <span class="test-id">${d.testId}</span>
            <div class="test-title">${d.title}</div>
            <div class="test-meta">
                <span>📅 ${date}</span>
                <span>📊 ${d.questions.length} Questions</span>
            </div>
        </div>
    `;
});

/* ===== OPEN LEADERBOARD ===== */
window.openBoard = async (testId) => {
    showLoading();
    currentTestId = testId;
    
    listDiv.style.display = "none";
    boardDiv.innerHTML = "";

    const resultSnap = await get(ref(db, "results/" + testId));
    const userSnap = await get(ref(db, "users"));

    if (!resultSnap.exists()) {
        boardDiv.innerHTML = `
            <div class="empty-state">
                <h3>No Results Yet</h3>
                <p>Be the first to complete this test!</p>
            </div>
            <button class="back-btn" onclick="location.reload()">← BACK TO TEST LIST</button>
        `;
        hideLoading();
        return;
    }

    let arr = [];

    Object.entries(resultSnap.val()).forEach(([uid, d]) => {
        const score = Number(d.score) || 0;
        const time = parseInt(d.time) || 0;
        const total = Number(d.total) || 0;
        const user = userSnap.val()[uid];
        
        if (!user) return;
        
        arr.push({
            uid: uid,
            score: score,
            time: time,
            total: total,
            userData: user
        });
    });

    // Sort by score (higher first) and time (lower first)
    arr.sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        return a.time - b.time;
    });

    allParticipants = arr.map((item, index) => ({
        ...item,
        rank: index + 1
    }));

    // Show leaderboard
    allParticipants.forEach((item, i) => {
        let rankClass = '';
        if (i === 0) rankClass = 'rank-1';
        else if (i === 1) rankClass = 'rank-2';
        else if (i === 2) rankClass = 'rank-3';

        boardDiv.innerHTML += `
            <div class="leaderboard-card" onclick="showProfile('${item.uid}')">
                <div class="rank-badge ${rankClass}">#${i + 1}</div>
                <div class="user-info">
                    <img src="${item.userData.photo}" class="user-avatar" alt="${item.userData.username}">
                    <div class="user-details">
                        <div class="user-name">${item.userData.username}</div>
                        <div class="score-details">
                            <span class="score-item">
                                <span class="score-value">${item.score}/${item.total}</span>
                            </span>
                        </div>
                    </div>
                </div>
                <div class="time-badge">${formatTime(item.time)}</div>
            </div>
        `;
    });

    boardDiv.innerHTML += `
        <button class="back-btn" onclick="location.reload()">
            ← BACK TO TEST LIST
        </button>
    `;

    hideLoading();
};

</script>

</body>
</html>
