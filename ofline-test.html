            align-items: center;

            height: 700px;

            flex-direction: column;
            overflow: hidden;

        }

            flex-direction: column;
            padding: 20px 16px 16px;

            background: #f8fafd;
        }
        
        .screen::-webkit-scrollbar {

        }
        
        .header-row {

            border-radius: 20px;
            padding: 12px 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .header-left {

            align-items: center;
            gap: 12px;
        }
        
        .back-btn {

            height: 40px;
            border-radius: 14px;
            background: #f1f5f9;
            border: none;
            color: #475569;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        
        .back-btn:hover {

        }
        
        .back-btn:active {

        }
        
        .app-title {

            font-weight: 700;
            color: #1e293b;

        .header-badge {

            font-weight: 600;

        }
        
        .stream-section {

            padding: 16px;

        }
        
        .stream-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            font-weight: 600;
            color: #334155;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid #f1f5f9;
        }
        
        .stream-title i {
            color: #667eea;
            font-size: 1.1rem;
        }
        
        .subject-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .subject-card {
            background: #ffffff;
            border: 1px solid #e9eef2;
            border-radius: 18px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .subject-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(102, 126, 234, 0.1);
            border-color: #667eea;
        }
        
        .subject-card:active {
            transform: scale(0.98);
        }
        
        .subject-left {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
        }
        
        .subject-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #667eea;
            font-size: 1.3rem;
        }
        
        .subject-info {
            min-width: 0;
        }
        
        .subject-info h3 {
            font-size: 1rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }
        
        .subject-info p {
            font-size: 0.7rem;
            color: #64748b;
        }

            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 600;
            white-space: nowrap;
        }
        
        .chapter-list {

            gap: 8px;
            margin-top: 8px;
        }
        
        .chapter-item {
            background: white;
            border: 1px solid #e9eef2;
            border-radius: 16px;
            padding: 14px 16px;

            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s ease;
        }

            background: #f8fafc;
            border-color: #667eea;
            transform: translateX(2px);
        }
        
        .chapter-item:active {
            transform: scale(0.98);
        }
        
        .chapter-name {
            font-size: 0.95rem;
            font-weight: 500;
            color: #334155;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 220px;
        }

            color: #667eea;
            margin-right: 8px;
            font-size: 0.8rem;
        }
        
        .question-count {
            background: #f1f5f9;
            color: #475569;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.6rem;
            font-weight: 600;
            white-space: nowrap;

            padding: 14px 20px;

            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            color: white;

            color: white;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 700;

            background: #f1f5f9;
            border-radius: 20px;
            flex: 1;
            overflow: hidden;

            height: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

            transition: width 0.3s ease;

            padding: 12px 0;

            font-weight: 600;
            font-size: 0.9rem;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .nav-btn:hover:not(:disabled) {
            background: #f8fafc;
            border-color: #94a3b8;
        }
        
        .nav-btn:active:not(:disabled) {
            transform: scale(0.97);
        }
        
        .nav-btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
        }
        
        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 28px;
            padding: 20px;

            height: 180px;
            border-radius: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 25px 30px -12px rgba(102, 126, 234, 0.4);
            position: relative;
        }
        
        .score-circle::before {
            content: '';
            position: absolute;
            inset: 5px;
            border-radius: 100px;
            background: white;
        }
        
        .score-number {
            font-size: 3.5rem;
            font-weight: 800;
            color: #1e293b;
            line-height: 1;
            position: relative;
            z-index: 1;
        }

            color: #64748b;
            font-weight: 500;
            position: relative;
            z-index: 1;
        }

            border-radius: 16px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .action-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
        }
        
        .secondary-btn {
            background: white;
            border: 2px solid #e9eef2;
            color: #475569;

            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;

            width: 280px;
            border-radius: 28px;
            padding: 24px 20px;
            text-align: center;
            animation: slideUp 0.3s ease;
        }

            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {

                transform: translateY(0);
            }
        }
        
        .dialog-btns {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .dialog-btn {
            flex: 1;
            padding: 12px 0;
            border-radius: 14px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        
        .hidden {
            display: none !important;
        }

        // Dialog function
        function showDialog(message, onConfirm, onCancel = null) {
            const container = document.getElementById('appContainer');
            const dialogHtml = `
                <div class="dialog-overlay" id="dialogOverlay">
                    <div class="dialog-box">
                        <i class="fas fa-question-circle" style="font-size: 2.5rem; color: #667eea;"></i>
                        <p>${message}</p>
                        <div class="dialog-btns">
                            <button class="dialog-btn" id="dialogConfirm" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color:white;">हाँ</button>
                            ${onCancel ? '<button class="dialog-btn" id="dialogCancel" style="background:#f1f5f9;">नहीं</button>' : ''}
                        </div>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', dialogHtml);
            document.getElementById('dialogConfirm')?.addEventListener('click', () => {
                document.getElementById('dialogOverlay')?.remove();
                if (onConfirm) onConfirm();
            });
            if (onCancel) {
                document.getElementById('dialogCancel')?.addEventListener('click', () => {
                    document.getElementById('dialogOverlay')?.remove();
                    onCancel();
                });
            }
        }

        // Render Chapters

            const subject = state.subjects[subjectKey];

                chaptersHtml = '<div style="text-align:center; padding:40px 0; color:#64748b;"><i class="fas fa-folder-open" style="font-size: 3rem; opacity:0.3;"></i><br>कोई अध्याय नहीं</div>';

        // Timer functions
        function startTimer() {
            if (state.timerInterval) clearInterval(state.timerInterval);
            const startTime = parseInt(localStorage.getItem(STORAGE_KEYS.START_TIME) || Date.now());
            if (!localStorage.getItem(STORAGE_KEYS.START_TIME)) {
                localStorage.setItem(STORAGE_KEYS.START_TIME, startTime.toString());
            }
            state.timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const remaining = Math.max(0, state.totalSeconds - elapsed);
                if (remaining <= 0) {
                    clearInterval(state.timerInterval);
                    submitTest();
                }
                const timerEl = document.getElementById('timerDisplay');
                if (timerEl) {
                    const mins = Math.floor(remaining / 60);
                    const secs = remaining % 60;
                    timerEl.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
                }
            }, 500);
        }

        function submitTest() {
            clearInterval(state.timerInterval);
            const qs = state.questions;
            const ans = state.answers;
            let correct = 0;
            qs.forEach((q, i) => {
                if (ans[i] && ans[i] === q.answer) correct++;
            });
            const total = qs.length;
            const percent = ((correct / total) * 100).toFixed(0);
            localStorage.setItem('last_result', JSON.stringify({ correct, total, percent }));
            localStorage.removeItem(STORAGE_KEYS.TEST_ACTIVE);
            localStorage.removeItem(STORAGE_KEYS.START_TIME);
            renderResult(correct, total, percent);
        }

                    <div class="option-item ${isChecked ? 'selected' : ''}" data-index="${i}">
                        <input type="radio" name="opt" value="${opt.replace(/"/g, '&quot;')}" ${isChecked}>
                        <span class="option-text">${letter}. ${opt}</span>
                    </div>

            const progress = ((state.currentIndex + 1) / state.questions.length) * 100;
            const html = `

                    <div class="nav-row">
                        <button class="nav-btn" id="prevBtn" ${state.currentIndex === 0 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i> पिछला</button>
                        <button class="nav-btn" id="nextBtn">${state.currentIndex === state.questions.length-1 ? 'समीक्षा' : 'अगला'} <i class="fas fa-chevron-right"></i></button>
                    </div>
                    <button class="nav-btn primary" id="submitBtn"><i class="fas fa-check-circle"></i> टेस्ट सबमिट करें</button>
                </div>
            `;
            document.getElementById('appContainer').innerHTML = html;

            document.getElementById('backToChapters')?.addEventListener('click', () => {
                clearInterval(state.timerInterval);
                localStorage.removeItem(STORAGE_KEYS.TEST_ACTIVE);
                renderChapters(state.currentSubject);
            });

            document.querySelectorAll('.option-item').forEach(item => {
                item.addEventListener('click', () => {
                    const radio = item.querySelector('input[type="radio"]');
                    if (radio) {
                        radio.checked = true;
                        state.answers[state.currentIndex] = radio.value;
                        document.querySelectorAll('.option-item').forEach(oi => oi.classList.remove('selected'));
                        item.classList.add('selected');
                    }
                });
            });

            document.getElementById('prevBtn')?.addEventListener('click', () => {
                if (state.currentIndex > 0) {
                    state.currentIndex--;
                    renderTest(chapterName);
                }
            });

            document.getElementById('nextBtn')?.addEventListener('click', () => {
                if (state.currentIndex < state.questions.length - 1) {
                    state.currentIndex++;
                    renderTest(chapterName);
                }
            });

            document.getElementById('submitBtn')?.addEventListener('click', () => {
                showDialog('क्या आप टेस्ट सबमिट करना चाहते हैं?', () => {
                    submitTest();
                }, () => {});
            });
        }

        function renderResult(correct, total, percent) {
            const html = `
                <div class="screen">
                    <div class="header-row">
                        <div class="header-left">
                            <div class="app-title">परिणाम</div>
                        </div>
                        <span class="header-badge"><i class="fas fa-check-circle"></i> पूर्ण</span>
                    </div>
                    <div class="result-content">
                        <div class="score-circle">
                            <span class="score-number">${correct}</span>
                            <span class="score-label">${total} में से</span>
                        </div>
                        <div style="font-size:2rem; font-weight:700; color:#1e293b;">${percent}%</div>
                        <div style="width:100%;">
                            <button class="action-btn" id="homeBtn"><i class="fas fa-home"></i> विषय सूची</button>
                            <button class="secondary-btn" id="restartBtn"><i class="fas fa-redo-alt"></i> पुनः प्रयास</button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('appContainer').innerHTML = html;
            document.getElementById('homeBtn')?.addEventListener('click', renderSubjects);
            document.getElementById('restartBtn')?.addEventListener('click', () => {
                state.answers = {};
                state.currentIndex = 0;
                localStorage.setItem(STORAGE_KEYS.TEST_ACTIVE, 'true');
                localStorage.removeItem(STORAGE_KEYS.START_TIME);
                startTimer();
                const subject = state.subjects[state.currentSubject];
                const chapter = subject?.chapters[state.currentChapter];
                renderTest(chapter?.name || 'प्रश्न');
            });
        }

        // Initialize
        window.addEventListener('load', renderSubjects);
    })();
</script>
</body>
</html>
