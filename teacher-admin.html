<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>M.M Public School · Admin Panel Pro</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', 'Segoe UI', Roboto, system-ui, sans-serif;
    }

    body {
      background: #eef3f9;
      min-height: 100vh;
      display: flex;
      position: relative;
    }

    /* ===== OVERLAY (for closing sidebar) ===== */
    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: transparent;
      display: none;
      z-index: 900;
    }
    body.sidebar-open .sidebar-overlay {
      display: block;
    }

    /* ===== SIDEBAR (collapsible, auto-open on hover/click) ===== */
    .admin-sidebar {
      position: fixed;
      left: 0;
      top: 0;
      height: 100%;
      width: 280px;
      background: #0a2540;
      border-radius: 0 40px 40px 0;
      padding: 32px 20px;
      display: flex;
      flex-direction: column;
      box-shadow: 6px 0 20px rgba(0, 20, 40, 0.2);
      transition: transform 0.25s ease;
      z-index: 1000;
      transform: translateX(-100%); /* hidden by default */
    }

    body.sidebar-open .admin-sidebar {
      transform: translateX(0); /* open when class added */
    }

    /* desktop hover: open sidebar (auto-open) */
    @media (min-width: 1024px) {
      .admin-sidebar {
        transition: transform 0.2s;
      }
      body:not(.sidebar-force-closed):hover .admin-sidebar,
      .admin-sidebar:hover {
        transform: translateX(0);
      }
      /* if we want to keep open after click, we use .sidebar-open class */
    }

    .school-logo {
      display: flex;
      align-items: center;
      gap: 14px;
      color: white;
      margin-bottom: 48px;
      padding-left: 12px;
    }

    .school-logo i {
      font-size: 2.4rem;
      color: #fdde7c;
    }

    .school-logo span {
      font-weight: 700;
      font-size: 1.4rem;
      line-height: 1.2;
    }

    .school-logo small {
      display: block;
      font-size: 0.8rem;
      font-weight: 400;
      opacity: 0.8;
    }

    .nav-menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 16px 24px;
      border-radius: 60px;
      color: #b7c9e2;
      font-weight: 500;
      font-size: 1.1rem;
      transition: 0.2s;
      cursor: pointer;
      background: transparent;
      border: none;
      width: 100%;
      text-align: left;
    }

    .nav-item i {
      width: 28px;
      font-size: 1.3rem;
    }

    .nav-item.active {
      background: #1f3a5f;
      color: white;
      box-shadow: 0 10px 18px -8px #0a1a2f;
    }

    .nav-item:not(.active):hover {
      background: #173150;
      color: #e0edff;
    }

    .sidebar-footer {
      margin-top: auto;
      color: #6d8bb0;
      padding: 24px 12px 8px;
      font-size: 0.9rem;
      border-top: 1px solid #1e3a5a;
    }

    /* ===== MAIN PANEL (adjust margin when sidebar open) ===== */
    .main-content {
      flex: 1;
      padding: 28px 32px;
      margin-left: 0;
      transition: margin-left 0.2s;
      width: 100%;
    }

    /* on desktop, give slight margin when sidebar open */
    body.sidebar-open .main-content {
      margin-left: 280px;
    }

    @media (min-width: 1024px) {
      body:not(.sidebar-force-closed):hover .main-content {
        margin-left: 280px;
      }
    }

    /* header & table styles (same professional) */
    .admin-header {
      max-width: 1300px;
      margin: 0 auto 30px;
      background: #ffffffd9;
      backdrop-filter: blur(6px);
      color: #0a2540;
      padding: 18px 32px;
      border-radius: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
      box-shadow: 0 12px 26px -8px rgba(10, 37, 64, 0.2);
      border: 1px solid rgba(255,255,255,0.7);
    }

    .admin-header h1 {
      font-size: 1.8rem;
      font-weight: 650;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #0a2540;
    }

    .admin-header h1 i {
      color: #f5b042;
    }

    .stats {
      display: flex;
      gap: 20px;
      background: #e3ecf7;
      padding: 10px 26px;
      border-radius: 60px;
    }

    .stats span {
      font-weight: 600;
      font-size: 1.1rem;
      color: #0e2d4f;
    }

    .stats i {
      color: #c27e2e;
      margin-right: 8px;
    }

    .table-card {
      max-width: 1300px;
      margin: 0 auto;
      background: white;
      border-radius: 48px;
      padding: 32px 30px;
      box-shadow: 0 25px 45px -12px rgba(0,30,60,0.15);
      border: 1px solid rgba(255,255,255,0.8);
      overflow-x: auto;
    }

    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 18px;
    }

    .table-header h2 {
      color: #0b2d5e;
      font-size: 1.7rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .refresh-btn {
      background: #ecf2fa;
      border: none;
      padding: 12px 32px;
      border-radius: 60px;
      font-weight: 600;
      color: #0b2d5e;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: 0.1s;
      border: 1px solid rgba(11,45,94,0.15);
      font-size: 1rem;
    }

    .teacher-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1050px;
    }

    .teacher-table th {
      text-align: left;
      padding: 20px 12px;
      background: #f4f9ff;
      color: #0b2d5e;
      font-weight: 600;
      font-size: 0.95rem;
      border-bottom: 3px solid #cbd9ec;
    }

    .teacher-table td {
      padding: 16px 12px;
      border-bottom: 1px solid #e0eaf5;
      color: #1e3a5f;
      vertical-align: middle;
    }

    .teacher-photo {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      background: #e0ebf9;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0b2d5e;
      font-size: 1.3rem;
    }

    .teacher-photo img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    .no-photo {
      background: #e0ebf9;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0b2d5e;
      font-size: 1.2rem;
    }

    .action-btn {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      margin: 0 6px;
      padding: 8px;
      border-radius: 30px;
      transition: 0.1s;
    }

    .action-btn.view { color: #0b2d5e; }
    .action-btn.edit { color: #1d7a4c; }
    .action-btn.delete { color: #b02a37; }
    .action-btn:hover {
      background: #ecf2fa;
      transform: scale(1.1);
    }

    .badge {
      background: #e0ebf9;
      padding: 5px 14px;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #0b2d5e;
      display: inline-block;
    }

    /* Full control edit modal */
    .modal, .edit-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 30, 50, 0.5);
      backdrop-filter: blur(5px);
      align-items: center;
      justify-content: center;
      z-index: 5000;
    }

    .modal-card, .edit-card {
      background: white;
      max-width: 560px;
      width: 90%;
      border-radius: 56px;
      padding: 36px 38px;
      box-shadow: 0 40px 70px rgba(0,20,40,0.3);
      max-height: 85vh;
      overflow-y: auto;
    }

    .modal-card h3, .edit-card h3 {
      color: #0b2d5e;
      font-size: 1.9rem;
      font-weight: 650;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 2px solid #e8effa;
      padding-bottom: 20px;
    }

    .modal-detail {
      margin: 16px 0;
      display: flex;
      font-size: 1.05rem;
    }
    .modal-detail .label {
      width: 140px;
      font-weight: 700;
      color: #1e3a5f;
    }
    .modal-detail .value {
      flex: 1;
      color: #0b2d5e;
      font-weight: 500;
    }

    /* edit form */
    .edit-field {
      margin-bottom: 20px;
    }
    .edit-field label {
      font-weight: 700;
      color: #1e3a5f;
      display: block;
      margin-bottom: 6px;
      font-size: 0.95rem;
    }
    .edit-field input, .edit-field select, .edit-field textarea {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #dde3ec;
      border-radius: 40px;
      font-size: 1rem;
      background: #f9fcff;
    }
    .edit-field textarea {
      border-radius: 30px;
      resize: vertical;
    }

    .edit-actions {
      display: flex;
      gap: 16px;
      margin-top: 30px;
    }
    .save-btn, .cancel-btn {
      flex: 1;
      padding: 16px;
      border: none;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
    }
    .save-btn {
      background: #0b2d5e;
      color: white;
    }
    .cancel-btn {
      background: #ecf2fa;
      color: #0a2540;
    }

    .modal-close {
      background: #ecf2fa;
      border: none;
      padding: 16px 32px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1.1rem;
      margin-top: 28px;
      width: 100%;
      cursor: pointer;
    }

    .admin-toast {
      position: fixed;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 18px 38px;
      border-radius: 80px;
      display: none;
      align-items: center;
      gap: 14px;
      font-weight: 600;
      font-size: 1.1rem;
      z-index: 6000;
      box-shadow: 0 16px 40px rgba(0,30,60,0.25);
      border-left: 7px solid #0b2d5e;
    }

    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10,25,45,0.3);
      backdrop-filter: blur(5px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 7000;
    }

    .confirm-card {
      background: white;
      padding: 32px 40px;
      border-radius: 60px;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 30px 50px #0a254030;
    }

    .confirm-card p {
      font-size: 1.3rem;
      color: #0a2540;
      margin: 24px 0 28px;
    }

    .confirm-actions {
      display: flex;
      gap: 15px;
      justify-content: center;
    }
    .confirm-btn {
      border: none;
      padding: 14px 36px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
    }
    .confirm-btn.yes { background: #b02a37; color: white; }
    .confirm-btn.no { background: #ecf2fa; color: #0a2540; }

    /* menu toggle for mobile */
    .menu-toggle {
      display: none;
      background: #0b2d5e;
      color: white;
      border: none;
      padding: 15px 20px;
      border-radius: 50px;
      font-size: 1.4rem;
      margin-bottom: 15px;
      cursor: pointer;
    }
    @media (max-width: 768px) {
      .menu-toggle { display: inline-block; }
    }
  </style>
</head>
<body>
  <!-- overlay to close sidebar when clicked outside -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- SIDEBAR (3 menu items + extra) -->
  <div class="admin-sidebar" id="mainSidebar">
    <div class="school-logo">
      <i class="fas fa-landmark"></i>
      <span>M.M Public <small>admin</small></span>
    </div>

    <div class="nav-menu">
      <button class="nav-item active" data-menu="teachers"><i class="fas fa-chalkboard-teacher"></i> Teachers</button>
      <button class="nav-item" data-menu="students"><i class="fas fa-user-graduate"></i> Students</button>
      <button class="nav-item" data-menu="settings"><i class="fas fa-cog"></i> Settings</button>
      <button class="nav-item" data-menu="events"><i class="fas fa-calendar-alt"></i> Events</button>
    </div>

    <div class="sidebar-footer">
      <i class="fas fa-shield-alt"></i> v2.0 · secure
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content">
    <!-- mobile menu button -->
    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i> Menu</button>

    <div class="admin-header">
      <h1><i class="fas fa-user-shield"></i> Teacher Control</h1>
      <div class="stats">
        <span><i class="fas fa-users"></i> <span id="totalCount">0</span> total</span>
        <span><i class="fas fa-venus-mars"></i> <span id="genderCount">-</span></span>
      </div>
    </div>

    <div class="table-card">
      <div class="table-header">
        <h2><i class="fas fa-list"></i> Registered Teachers</h2>
        <button class="refresh-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh data</button>
      </div>
      <div id="tableContainer">
        <div class="empty-state"><i class="fas fa-spinner fa-pulse fa-2x"></i><p>Loading teacher records ...</p></div>
      </div>
    </div>
  </div>

  <!-- View modal -->
  <div class="modal" id="viewModal">
    <div class="modal-card">
      <h3><i class="fas fa-id-card"></i> full profile</h3>
      <div id="modalContent"></div>
      <button class="modal-close" id="closeModalBtn">close details</button>
    </div>
  </div>

  <!-- EDIT MODAL (full control) -->
  <div class="edit-modal" id="editModal">
    <div class="edit-card">
      <h3><i class="fas fa-user-edit"></i> Edit teacher</h3>
      <form id="editForm">
        <input type="hidden" id="editId">
        <div class="edit-field"><label>Full name</label><input type="text" id="editName" placeholder="Full name"></div>
        <div class="edit-field"><label>Teacher ID</label><input type="text" id="editTeacherId" placeholder="TCHR001"></div>
        <div class="edit-field"><label>Mobile</label><input type="tel" id="editMobile" placeholder="+91 98765 43210"></div>
        <div class="edit-field"><label>Email</label><input type="email" id="editEmail" placeholder="teacher@school.com"></div>
        <div class="edit-field"><label>Subject</label><input type="text" id="editSubject" placeholder="Mathematics"></div>
        <div class="edit-field"><label>Gender</label><select id="editGender"><option value="male">Male</option><option value="female">Female</option><option value="other">Other</option></select></div>
        <div class="edit-field"><label>Qualification</label><input type="text" id="editQualification" placeholder="M.Sc, B.Ed"></div>
        <div class="edit-field"><label>Experience (years)</label><input type="number" id="editExperience" min="0" step="1"></div>
        <div class="edit-field"><label>About / Bio</label><textarea id="editAbout" rows="2" placeholder="Short description"></textarea></div>
        <div class="edit-field"><label>Username</label><input type="text" id="editUsername" placeholder="teacher_username"></div>
        <div class="edit-field"><label>Photo URL</label><input type="url" id="editPhotoURL" placeholder="https://example.com/photo.jpg"></div>

        <div class="edit-actions">
          <button type="button" class="cancel-btn" id="cancelEditBtn">Cancel</button>
          <button type="submit" class="save-btn">Save changes</button>
        </div>
      </form>
    </div>
  </div>

  <!-- confirm delete modal -->
  <div class="confirm-overlay" id="confirmDeleteModal">
    <div class="confirm-card">
      <i class="fas fa-trash-alt" style="font-size:3rem; color:#b02a37;"></i>
      <p>Remove this teacher permanently?</p>
      <div class="confirm-actions">
        <button class="confirm-btn no" id="cancelDeleteBtn">cancel</button>
        <button class="confirm-btn yes" id="confirmDeleteBtn">delete</button>
      </div>
    </div>
  </div>

  <!-- toast -->
  <div class="admin-toast" id="adminToast"><i class="fas" id="toastIcon"></i><span id="toastMsg"></span></div>

  <script type="module">
    // Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
    import { getDatabase, ref, onValue, remove, update } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAHAQjn4sTuR9FiGF3ljRrFEMZQjsx-SHg",
      authDomain: "apni-duniya-b53d7.firebaseapp.com",
      databaseURL: "https://apni-duniya-b53d7-default-rtdb.firebaseio.com",
      projectId: "apni-duniya-b53d7"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // DOM elements
    const tableContainer = document.getElementById('tableContainer');
    const totalSpan = document.getElementById('totalCount');
    const genderSpan = document.getElementById('genderCount');
    const refreshBtn = document.getElementById('refreshBtn');
    const viewModal = document.getElementById('viewModal');
    const modalContent = document.getElementById('modalContent');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const adminToast = document.getElementById('adminToast');
    const confirmModal = document.getElementById('confirmDeleteModal');
    const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
    const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');
    const editModal = document.getElementById('editModal');
    const editForm = document.getElementById('editForm');
    const cancelEditBtn = document.getElementById('cancelEditBtn');

    // sidebar & overlay
    const body = document.body;
    const sidebar = document.getElementById('mainSidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const menuToggle = document.getElementById('menuToggle');
    const navItems = document.querySelectorAll('.nav-item');

    let teachersData = [];
    let pendingDeleteId = null;

    // ---------- SIDEBAR OPEN/CLOSE LOGIC ----------
    function openSidebar() { body.classList.add('sidebar-open'); }
    function closeSidebar() { body.classList.remove('sidebar-open'); }

    // hover auto-open for desktop: we handle via css, but click also toggles
    menuToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      if (body.classList.contains('sidebar-open')) closeSidebar();
      else openSidebar();
    });

    // close when clicking overlay
    overlay.addEventListener('click', closeSidebar);

    // close when clicking any nav item (optional, but feels natural)
    navItems.forEach(item => {
      item.addEventListener('click', () => {
        // mark active (visual only)
        navItems.forEach(n => n.classList.remove('active'));
        item.classList.add('active');
        // you can later route; for now just close sidebar on mobile/any
        if (window.innerWidth < 1024) closeSidebar(); 
      });
    });

    // on escape key close sidebar
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && body.classList.contains('sidebar-open')) closeSidebar();
    });

    // ---------- TOAST ----------
    function showAdminToast(msg, type = 'success') {
      const toast = adminToast;
      const icon = document.getElementById('toastIcon');
      toast.style.display = 'flex';
      let iconName = 'fa-circle-check';
      let color = '#1d7a4c';
      if (type === 'error') { iconName = 'fa-circle-exclamation'; color = '#b02a37'; }
      else if (type === 'info') { iconName = 'fa-info-circle'; color = '#0b2d5e'; }
      icon.className = `fas ${iconName}`;
      icon.style.color = color;
      toast.style.borderLeftColor = color;
      document.getElementById('toastMsg').innerText = msg;
      setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }

    // ---------- LOAD TEACHERS ----------
    function loadTeachers() {
      const teachersRef = ref(db, 'teachers');
      onValue(teachersRef, (snapshot) => {
        if (snapshot.exists()) {
          const data = snapshot.val();
          teachersData = Object.entries(data).map(([id, val]) => ({ id, ...val }));
          renderTable(teachersData);
          updateStats(teachersData);
        } else {
          tableContainer.innerHTML = '<div class="empty-state"><i class="fas fa-user-slash"></i><p>No teachers registered yet.</p></div>';
          totalSpan.innerText = '0'; genderSpan.innerText = '0 M / 0 F';
        }
      }, (error) => {
        tableContainer.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Error loading data</p></div>';
        showAdminToast('Failed to load teachers', 'error');
      });
    }

    function updateStats(teachers) {
      totalSpan.innerText = teachers.length;
      const male = teachers.filter(t => t.gender === 'male').length;
      const female = teachers.filter(t => t.gender === 'female').length;
      genderSpan.innerText = `${male} M / ${female} F`;
    }

    function renderTable(teachers) {
      if (!teachers.length) {
        tableContainer.innerHTML = '<div class="empty-state"><i class="fas fa-user-slash"></i><p>No teacher records found</p></div>';
        return;
      }
      let html = `<table class="teacher-table"><thead><tr><th>Photo</th><th>Teacher ID</th><th>Full name</th><th>Mobile</th><th>Email</th><th>Subject</th><th>Gender</th><th>Exp</th><th>Actions</th></tr></thead><tbody>`;
      teachers.forEach(t => {
        const photoHtml = t.photoURL ? `<div class="teacher-photo"><img src="${t.photoURL}" alt="photo"></div>` : `<div class="no-photo"><i class="fas fa-user"></i></div>`;
        const genderBadge = t.gender ? `<span class="badge">${t.gender}</span>` : '<span class="badge">—</span>';
        html += `<tr><td>${photoHtml}</td><td><strong>${t.teacherId || t.id.substring(0,6)}</strong></td><td>${t.name || '—'}</td><td>${t.mobile || '—'}</td><td>${t.email || '—'}</td><td>${t.subject || '—'}</td><td>${genderBadge}</td><td>${t.experience ?? '0'}</td>
          <td><button class="action-btn view" data-id="${t.id}" title="view"><i class="fas fa-eye"></i></button>
          <button class="action-btn edit" data-id="${t.id}" title="full edit"><i class="fas fa-pen-to-square"></i></button>
          <button class="action-btn delete" data-id="${t.id}" title="delete"><i class="fas fa-trash"></i></button></td></tr>`;
      });
      html += '</tbody></table>';
      tableContainer.innerHTML = html;

      document.querySelectorAll('.action-btn.view').forEach(btn => btn.addEventListener('click', (e) => {
        const teacher = teachersData.find(t => t.id === e.currentTarget.dataset.id);
        if (teacher) showViewModal(teacher);
      }));
      document.querySelectorAll('.action-btn.edit').forEach(btn => btn.addEventListener('click', (e) => {
        const teacher = teachersData.find(t => t.id === e.currentTarget.dataset.id);
        if (teacher) openEditModal(teacher);
      }));
      document.querySelectorAll('.action-btn.delete').forEach(btn => btn.addEventListener('click', (e) => {
        pendingDeleteId = e.currentTarget.dataset.id;
        confirmModal.style.display = 'flex';
      }));
    }

    // view
    function showViewModal(teacher) {
      modalContent.innerHTML = Object.entries(teacher).filter(([k]) => !k.includes('photoURL') && k!=='id').map(([key,val]) => 
        `<div class="modal-detail"><span class="label">${key}:</span> <span class="value">${val ?? '—'}</span></div>`
      ).join('');
      viewModal.style.display = 'flex';
    }

    // edit full control
    function openEditModal(t) {
      document.getElementById('editId').value = t.id || '';
      document.getElementById('editName').value = t.name || '';
      document.getElementById('editTeacherId').value = t.teacherId || '';
      document.getElementById('editMobile').value = t.mobile || '';
      document.getElementById('editEmail').value = t.email || '';
      document.getElementById('editSubject').value = t.subject || '';
      document.getElementById('editGender').value = t.gender || 'male';
      document.getElementById('editQualification').value = t.qualification || '';
      document.getElementById('editExperience').value = t.experience || 0;
      document.getElementById('editAbout').value = t.about || '';
      document.getElementById('editUsername').value = t.username || '';
      document.getElementById('editPhotoURL').value = t.photoURL || '';
      editModal.style.display = 'flex';
    }

    // save edit
    editForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const id = document.getElementById('editId').value;
      const updatedData = {
        name: document.getElementById('editName').value,
        teacherId: document.getElementById('editTeacherId').value,
        mobile: document.getElementById('editMobile').value,
        email: document.getElementById('editEmail').value,
        subject: document.getElementById('editSubject').value,
        gender: document.getElementById('editGender').value,
        qualification: document.getElementById('editQualification').value,
        experience: parseInt(document.getElementById('editExperience').value) || 0,
        about: document.getElementById('editAbout').value,
        username: document.getElementById('editUsername').value,
        photoURL: document.getElementById('editPhotoURL').value,
      };
      const updates = {};
      updates[`teachers/${id}`] = updatedData;
      update(ref(db), updates).then(() => {
        showAdminToast('Teacher updated fully', 'success');
        editModal.style.display = 'none';
      }).catch(() => showAdminToast('Update error', 'error'));
    });

    cancelEditBtn.addEventListener('click', () => editModal.style.display = 'none');

    // delete confirm
    confirmDeleteBtn.addEventListener('click', () => {
      if (pendingDeleteId) {
        remove(ref(db, `teachers/${pendingDeleteId}`)).then(() => {
          showAdminToast('Teacher deleted', 'success');
          confirmModal.style.display = 'none';
        }).catch(() => showAdminToast('Delete failed', 'error'));
      }
    });
    cancelDeleteBtn.addEventListener('click', () => { confirmModal.style.display = 'none'; pendingDeleteId = null; });

    closeModalBtn.addEventListener('click', () => viewModal.style.display = 'none');
    window.addEventListener('click', (e) => {
      if (e.target === viewModal) viewModal.style.display = 'none';
      if (e.target === editModal) editModal.style.display = 'none';
      if (e.target === confirmModal) { confirmModal.style.display = 'none'; pendingDeleteId = null; }
    });

    refreshBtn.addEventListener('click', () => { loadTeachers(); showAdminToast('Refreshed', 'info'); });

    loadTeachers();
  </script>
</body>
</html>
