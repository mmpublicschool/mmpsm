<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admission Coming Soon | M.M Public School</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0a2a66,#1e4b8f);
overflow:hidden;
color:white;
text-align:center;
padding:20px;
}

/* FLOATING BACKGROUND CIRCLES */
body::before, body::after{
content:'';
position:absolute;
width:300px;
height:300px;
background:rgba(255,255,255,0.08);
border-radius:50%;
animation:float 8s infinite ease-in-out;
}

body::before{
top:-100px;
left:-100px;
}

body::after{
bottom:-100px;
right:-100px;
animation-delay:4s;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-30px);}
}

/* CARD */
.container{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
padding:40px 25px;
border-radius:30px;
box-shadow:0 20px 60px rgba(0,0,0,0.3);
max-width:420px;
width:100%;
animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}

.logo{
font-size:50px;
margin-bottom:20px;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%,100%{transform:scale(1);}
50%{transform:scale(1.1);}
}

h1{
font-size:28px;
font-weight:800;
margin-bottom:10px;
}

p{
font-size:14px;
opacity:0.9;
margin-bottom:25px;
}

/* COUNTDOWN */
.countdown{
display:flex;
justify-content:space-between;
margin-bottom:25px;
}

.time-box{
background:rgba(255,255,255,0.15);
padding:12px;
border-radius:15px;
width:22%;
}

.time-box h2{
font-size:20px;
margin-bottom:4px;
}

.time-box span{
font-size:11px;
opacity:0.8;
}

/* BUTTON */
.notify-btn{
width:100%;
padding:14px;
border:none;
border-radius:40px;
background:white;
color:#0a2a66;
font-weight:700;
font-size:14px;
cursor:pointer;
transition:0.4s;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.notify-btn:hover{
transform:translateY(-4px);
box-shadow:0 15px 35px rgba(0,0,0,0.4);
}

.footer{
margin-top:20px;
font-size:12px;
opacity:0.8;
}
</style>
</head>

<body>

<div class="container">
<div class="logo">
<i class="fa-solid fa-graduation-cap"></i>
</div>

<h1>Admission Coming Soon</h1>
<p>Admissions for session 2026 will start very soon. Stay tuned for updates!</p>

<div class="countdown">
<div class="time-box">
<h2 id="days">00</h2>
<span>Days</span>
</div>
<div class="time-box">
<h2 id="hours">00</h2>
<span>Hours</span>
</div>
<div class="time-box">
<h2 id="minutes">00</h2>
<span>Minutes</span>
</div>
<div class="time-box">
<h2 id="seconds">00</h2>
<span>Seconds</span>
</div>
</div>

<button class="notify-btn" onclick="goHome()">
<i class="fa-solid fa-bell"></i> Notify Me
</button>

<div class="footer">
© 2026 M.M Public School Mundeshwari
</div>
</div>

<script>
// SET ADMISSION START DATE
const launchDate = new Date("March 30, 2026 00:00:00").getTime();

setInterval(function(){
const now = new Date().getTime();
const distance = launchDate - now;

const days = Math.floor(distance / (1000*60*60*24));
const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
const seconds = Math.floor((distance % (1000*60)) / 1000);

document.getElementById("days").innerText = days;
document.getElementById("hours").innerText = hours;
document.getElementById("minutes").innerText = minutes;
document.getElementById("seconds").innerText = seconds;

},1000);

function goHome(){
window.location.href="index.html";
}
</script>

</body>
</html>
