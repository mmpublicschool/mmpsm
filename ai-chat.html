<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon | M.M Public School</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#ffffff;
overflow:hidden;
}

.container{
text-align:center;
padding:30px;
max-width:500px;
}

.logo{
width:110px;
height:110px;
border-radius:50%;
overflow:hidden;
margin:0 auto 20px;
border:4px solid #0a2a66;
box-shadow:0 10px 30px rgba(10,42,102,0.2);
animation:float 3s ease-in-out infinite;
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-6px);}
}

h1{
font-size:28px;
color:#0a2a66;
font-weight:900;
margin-bottom:8px;
}

p{
color:#555;
font-size:14px;
margin-bottom:25px;
line-height:1.6;
}

.countdown{
display:flex;
justify-content:center;
gap:15px;
margin-bottom:30px;
}

.time-box{
background:#f4f6fa;
padding:14px 18px;
border-radius:18px;
min-width:70px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.time-box h2{
color:#0a2a66;
font-size:20px;
font-weight:900;
}

.time-box span{
font-size:11px;
color:#888;
}

.btn{
display:inline-block;
padding:12px 26px;
background:linear-gradient(135deg,#0a2a66,#1e4b8f);
color:white;
border-radius:40px;
text-decoration:none;
font-weight:700;
font-size:14px;
transition:0.2s;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(10,42,102,0.3);
}

.footer{
position:absolute;
bottom:15px;
width:100%;
text-align:center;
font-size:12px;
color:#777;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="logo.png" alt="School Logo" onerror="this.src='https://via.placeholder.com/110'">
</div>

<h1>Coming Soon</h1>

<p>
This feature is currently under development.<br>
It will be available very soon.
</p>

<div class="countdown">
<div class="time-box">
<h2 id="days">00</h2>
<span>Days</span>
</div>
<div class="time-box">
<h2 id="hours">00</h2>
<span>Hours</span>
</div>
<div class="time-box">
<h2 id="minutes">00</h2>
<span>Minutes</span>
</div>
<div class="time-box">
<h2 id="seconds">00</h2>
<span>Seconds</span>
</div>
</div>

<a href="index.html" class="btn">
<i class="fa-solid fa-arrow-left"></i> Back to Home
</a>

</div>

<div class="footer">
© 2026 M.M Public School Mundeshwari
</div>

<script>

// Countdown Date (change if needed)
const launchDate = new Date();
launchDate.setDate(launchDate.getDate() + 15);

function updateCountdown(){
const now = new Date().getTime();
const distance = launchDate - now;

const days = Math.floor(distance / (1000 * 60 * 60 * 24));
const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
const seconds = Math.floor((distance % (1000 * 60)) / 1000);

document.getElementById("days").innerText = days;
document.getElementById("hours").innerText = hours;
document.getElementById("minutes").innerText = minutes;
document.getElementById("seconds").innerText = seconds;
}

setInterval(updateCountdown,1000);

</script>

</body>
</html>
