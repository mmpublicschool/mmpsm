<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Test History</title>
  
  <style>
    /* ===== MODERN RESET ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    /* ===== HEADER ===== */
    .header {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(10px);
      border-radius: 30px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      position: relative;
      overflow: hidden;
      text-align: center;
    }

    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #667eea, #764ba2, #fbbf24);
    }

    .header h1 {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .header p {
      color: #64748b;
      font-size: 14px;
    }

    /* ===== HISTORY LIST ===== */
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ===== HISTORY CARD ===== */
    .history-card {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      border: 2px solid transparent;
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      animation: slideIn 0.5s ease forwards;
      opacity: 0;
      transform: translateX(-20px);
    }

    .history-card:hover {
      transform: translateY(-5px) scale(1.02);
      border-color: #667eea;
      box-shadow: 0 20px 40px rgba(102, 126, 234, 0.3);
    }

    .history-card:active {
      transform: scale(0.98);
    }

    /* Card Accent Line */
    .history-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 6px;
      height: 100%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 24px 0 0 24px;
    }

    /* Card Content */
    .card-content {
      margin-left: 10px;
    }

    .test-id {
      display: inline-block;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 6px 16px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .test-title {
      font-size: 20px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .test-meta {
      display: flex;
      gap: 20px;
      color: #64748b;
      font-size: 14px;
      flex-wrap: wrap;
    }

    .test-meta span {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .meta-icon {
      font-size: 16px;
    }

    /* Card Footer */
    .card-footer {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 2px dashed #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .view-btn {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .view-btn:hover {
      transform: translateX(5px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }

    /* ===== LOADING SCREEN (PROFESSIONAL) ===== */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      animation: fadeIn 0.3s ease;
    }

    .loading-content {
      background: white;
      width: 90%;
      max-width: 380px;
      border-radius: 40px;
      padding: 35px 25px;
      text-align: center;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
      animation: scaleIn 0.4s ease;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    /* Professional Loading Animation - No Spinner */
    .loading-animation {
      width: 120px;
      height: 120px;
      margin: 0 auto 25px;
      position: relative;
    }

    /* Book Animation */
    .book {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 20px 20px 8px 8px;
      position: relative;
      animation: float 2s ease-in-out infinite;
      box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
    }

    .book::before {
      content: '';
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      bottom: 8px;
      background: white;
      border-radius: 12px 12px 4px 4px;
    }

    .book::after {
      content: '';
      position: absolute;
      top: 15px;
      left: 15px;
      right: 15px;
      bottom: 15px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 8px;
      opacity: 0.2;
      animation: pageTurn 1.5s ease-in-out infinite;
    }

    .page-line {
      position: absolute;
      left: 25px;
      right: 25px;
      height: 4px;
      background: #e2e8f0;
      border-radius: 2px;
      animation: lines 1.5s ease-in-out infinite;
    }

    .page-line:nth-child(1) { top: 35px; animation-delay: 0s; }
    .page-line:nth-child(2) { top: 50px; animation-delay: 0.2s; }
    .page-line:nth-child(3) { top: 65px; animation-delay: 0.4s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(1deg); }
    }

    @keyframes pageTurn {
      0%, 100% { transform: scaleY(1); opacity: 0.2; }
      50% { transform: scaleY(0.8); opacity: 0.4; }
    }

    @keyframes lines {
      0%, 100% { transform: scaleX(1); opacity: 1; }
      50% { transform: scaleX(0.8); opacity: 0.5; }
    }

    .loading-title {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .loading-text {
      color: #64748b;
      font-size: 15px;
      margin-bottom: 20px;
    }

    .loading-progress {
      width: 100%;
      height: 6px;
      background: #e2e8f0;
      border-radius: 3px;
      overflow: hidden;
    }

    .loading-progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 3px;
      animation: progress 1.5s ease-in-out infinite;
    }

    @keyframes progress {
      0% { width: 0%; }
      50% { width: 70%; }
      100% { width: 100%; }
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      background: white;
      border-radius: 28px;
      padding: 60px 20px;
      text-align: center;
      color: #94a3b8;
    }

    .empty-state i {
      font-size: 60px;
      margin-bottom: 20px;
      display: block;
    }

    .empty-state h3 {
      font-size: 20px;
      color: #1e293b;
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 14px;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes slideIn {
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes scaleIn {
      from {
        transform: scale(0.9);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* Animation Delays for Cards */
    .history-card:nth-child(1) { animation-delay: 0.1s; }
    .history-card:nth-child(2) { animation-delay: 0.2s; }
    .history-card:nth-child(3) { animation-delay: 0.3s; }
    .history-card:nth-child(4) { animation-delay: 0.4s; }
    .history-card:nth-child(5) { animation-delay: 0.5s; }
    .history-card:nth-child(6) { animation-delay: 0.6s; }
    .history-card:nth-child(7) { animation-delay: 0.7s; }
    .history-card:nth-child(8) { animation-delay: 0.8s; }
    .history-card:nth-child(9) { animation-delay: 0.9s; }
    .history-card:nth-child(10) { animation-delay: 1s; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      body {
        padding: 15px;
      }

      .header {
        padding: 20px;
      }

      .header h1 {
        font-size: 24px;
      }

      .test-title {
        font-size: 18px;
      }

      .test-meta {
        gap: 12px;
        font-size: 13px;
      }

      .card-footer {
        flex-direction: column;
        gap: 12px;
        align-items: flex-start;
      }

      .view-btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <!-- Header -->
  <div class="header">
    <h1>📚 Test History</h1>
    <p>Your complete test journey at a glance</p>
  </div>

  <!-- History List -->
  <div id="list" class="history-list"></div>

  <!-- Professional Loading Screen -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-content">
      <div class="loading-animation">
        <div class="book">
          <div class="page-line"></div>
          <div class="page-line"></div>
          <div class="page-line"></div>
        </div>
      </div>
      <div class="loading-title">Loading Tests</div>
      <div class="loading-text">Please wait while we fetch your test history...</div>
      <div class="loading-progress">
        <div class="loading-progress-bar"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-database.js";
    
    const app = initializeApp({
      apiKey: "AIzaSyCy1r8BXbe-W9UBsCrFDFgkHy-j7lYFwYg",
      databaseURL: "https://mmpublicschoolmundeshwar-233a4-default-rtdb.firebaseio.com"
    });
    
    const db = getDatabase(app);
    
    const list = document.getElementById("list");
    const loadingOverlay = document.getElementById("loadingOverlay");
    
    // Function to show loading
    function showLoading() {
      loadingOverlay.style.display = 'flex';
    }
    
    // Function to hide loading
    function hideLoading() {
      loadingOverlay.style.display = 'none';
    }
    
    // Function to format date
    function formatDate(timestamp) {
      const date = new Date(timestamp);
      return date.toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }
    
    // Show loading before fetching data
    showLoading();
    
    try {
      const snap = await get(ref(db, "onlineTest/history"));
      
      // Hide loading after data is fetched
      hideLoading();
      
      if (!snap.exists()) {
        list.innerHTML = `
          <div class="empty-state">
            <i>📭</i>
            <h3>No History Available</h3>
            <p>Complete a test to see your history here</p>
          </div>
        `;
      } else {
        const tests = Object.values(snap.val()).reverse(); // Show newest first
        
        tests.forEach(d => {
          const startDate = formatDate(d.startTime);
          const questionsCount = d.questions?.length || 0;
          
          list.innerHTML += `
            <div class="history-card" onclick="openTest('${d.testId}')">
              <div class="card-content">
                <span class="test-id">${d.testId}</span>
                <div class="test-title">${d.title}</div>
                <div class="test-meta">
                  <span>
                    <span class="meta-icon">📅</span>
                    ${startDate}
                  </span>
                  <span>
                    <span class="meta-icon">📊</span>
                    ${questionsCount} Questions
                  </span>
                </div>
                <div class="card-footer">
                  <span style="color: #64748b; font-size: 13px;">
                    Click to view details
                  </span>
                  <button class="view-btn" onclick="event.stopPropagation(); openTest('${d.testId}')">
                    View Results →
                  </button>
                </div>
              </div>
            </div>
          `;
        });
      }
    } catch (error) {
      hideLoading();
      list.innerHTML = `
        <div class="empty-state">
          <i>⚠️</i>
          <h3>Error Loading History</h3>
          <p>Please check your connection and try again</p>
        </div>
      `;
      console.error(error);
    }
    
    window.openTest = (id) => {
      // Show loading before redirect
      showLoading();
      
      // Small delay to show loading animation
      setTimeout(() => {
        location.href = "test-view.html?testId=" + id;
      }, 500);
    }
  </script>

</body>

</html>
