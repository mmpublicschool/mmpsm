<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Saved · perfect like/unlike & coming soon pro</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }

  body {
    background: #f2f6fc;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .header {
    background: #0a2a5e;
    color: #fff;
    padding: 1rem;
    text-align: center;
    font-weight: 700;
    font-size: 1.3rem;
    letter-spacing: 0.2px;
    box-shadow: 0 6px 14px rgba(0,20,50,0.08);
  }

  .container {
    max-width: 650px;
    margin: 0 auto;
    padding: 1.2rem 1rem 2.5rem;
    width: 100%;
  }

  /* ===== PROFESSIONAL LOADING ===== */
  .loading-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: white;
    border-radius: 40px;
    padding: 3rem 2rem;
    margin: 2rem 0;
    box-shadow: 0 10px 25px -8px rgba(0,0,0,0.05);
    border: 1px solid rgba(0,0,0,0.02);
  }
  .spinner {
    width: 52px;
    height: 52px;
    border: 4px solid #e8f0fe;
    border-top: 4px solid #2563eb;
    border-radius: 50%;
    animation: spin 0.9s cubic-bezier(0.4, 0.0, 0.2, 1) infinite;
    margin-bottom: 1.2rem;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  .loading-text {
    color: #334e77;
    font-weight: 500;
    font-size: 1.1rem;
    background: #ecf3fd;
    padding: 0.6rem 1.8rem;
    border-radius: 60px;
  }

  /* ===== CARD ===== */
  .card {
    background: #fff;
    border-radius: 26px;
    padding: 1.2rem 1.2rem 0.8rem 1.2rem;
    margin: 1.2rem 0;
    box-shadow: 0 8px 20px rgba(0,0,0,0.02), 0 2px 6px rgba(0,20,40,0.02);
    border: 1px solid #eef4fa;
    transition: all 0.2s ease;
    position: relative;
  }

  /* liked card style — vibrant and distinct */
  .card.liked {
    border-left: 6px solid #e03131;
    background: linear-gradient(145deg, #fff6f6, #ffffff);
    box-shadow: 0 10px 24px rgba(224, 49, 49, 0.15);
  }

  .owner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
  }

  .owner-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .owner-left img {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #b8d2f5;
  }

  .owner-name {
    font-weight: 600;
    color: #15387a;        /* distinct name colour */
    font-size: 0.95rem;
  }

  .warn {
    color: #d93848;
    font-weight: 600;
    font-size: 0.8rem;
    margin: 8px 0 6px 0;
    background: #ffeeee;
    padding: 0.3rem 1rem;
    border-radius: 40px;
    display: inline-block;
  }

  /* ===== TIMESTAMP at BOTTOM ===== */
  .timestamp-bottom {
    margin-top: 1rem;
    padding-top: 0.5rem;
    border-top: 1px dashed #cbd6e8;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.7rem;
    color: #6f87a5;        /* distinct time colour */
  }
  .timestamp-icon {
    width: 14px;
    height: 14px;
    stroke: #6f87a5;
    stroke-width: 2;
  }

  /* ===== THREE‑DOT MENU ===== */
  .menuBtn {
    font-size: 1.8rem;
    line-height: 1;
    cursor: pointer;
    padding: 0.2rem 0.6rem;
    border-radius: 30px;
    color: #3f5a82;
    transition: background 0.1s;
    user-select: none;
  }
  .menuBtn:hover { background: #e4edfc; }
  .menuBtn:active { background: #c9daf7; transform: scale(0.92); }

  .menuBox {
    position: absolute;
    right: 1rem;
    top: 4.2rem;
    background: #ffffff;
    border-radius: 24px;
    box-shadow: 0 16px 32px -10px rgba(10,40,70,0.25), 0 4px 12px rgba(0,0,0,0.08);
    display: none;
    flex-direction: column;
    overflow: hidden;
    min-width: 190px;
    z-index: 30;
    border: 1px solid #eaf1fd;
    animation: menuPop 0.2s cubic-bezier(0.2, 0.9, 0.3, 1.1);
  }

  @keyframes menuPop {
    0% { opacity: 0; transform: scale(0.75) translateY(-10px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  .menuBox button {
    border: none;
    background: #fff;
    padding: 0.9rem 1.2rem;
    font-weight: 600;
    font-size: 0.95rem;
    text-align: left;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    color: #1f3f70;
    transition: background 0.08s;
    border-bottom: 1px solid #f0f6ff;
    position: relative;
  }
  .menuBox button:last-child { border-bottom: none; }
  .menuBox button:hover { background: #f2f9ff; }
  .menuBox button:active { background: #ddeaff; transform: scale(0.98); }

  .menu-icon {
    width: 20px;
    height: 20px;
    stroke: currentColor;
    stroke-width: 2;
    fill: none;
  }

  .new-badge {
    background: #2563eb;
    color: white;
    font-size: 0.6rem;
    font-weight: 700;
    padding: 0.2rem 0.5rem;
    border-radius: 30px;
    margin-left: 8px;
    text-transform: uppercase;
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse {
    0% { opacity: 0.7; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); background: #3b82f6; }
    100% { opacity: 0.7; transform: scale(1); }
  }

  /* q&options */
  .q {
    font-weight: 700;
    font-size: 1.05rem;
    margin: 0.9rem 0 0.7rem 0;
    color: #0e2d57;
  }

  .opt {
    padding: 0.7rem 1rem;
    border-radius: 24px;
    border: 1.5px solid #e2ecfa;
    margin: 0.6rem 0;
    background: #ffffff;
    font-weight: 450;
  }
  .correct {
    background: #dcfce7;
    border-color: #34b56f;
    font-weight: 500;
  }
  .your {
    background: #fff7dd;
    border-color: #f0b849;
    font-weight: 500;
  }

  /* ===== TOAST ===== */
  .toast-container {
    position: fixed;
    bottom: 28px;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    pointer-events: none;
    z-index: 200;
  }
  .toast {
    background: #1e2f4a;
    color: white;
    padding: 0.9rem 2rem;
    border-radius: 60px;
    font-weight: 500;
    font-size: 0.95rem;
    box-shadow: 0 16px 32px -8px #0a2a66;
    display: flex;
    align-items: center;
    gap: 10px;
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.1);
    animation: toastIn 0.2s ease;
  }
  @keyframes toastIn {
    0% { transform: scale(0.7) translateY(20px); opacity: 0; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }

  /* confirm dialog */
  .confirm-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.2);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 300;
    backdrop-filter: blur(3px);
  }
  .confirm-box {
    background: #fff;
    padding: 1.8rem 1.8rem 1.5rem;
    border-radius: 40px;
    width: 300px;
    text-align: center;
    box-shadow: 0 30px 50px -15px #0a2a66;
    animation: confirmPop 0.2s ease;
  }
  .confirm-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 1.5rem;
  }
  .confirm-btn {
    border: none;
    padding: 0.7rem 1.8rem;
    border-radius: 60px;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    transition: 0.1s;
    border: 1px solid #ccdff5;
  }
  .confirm-btn.cancel { background: #f2f7ff; color: #2b4f7c; }
  .confirm-btn.delete { background: #d93848; color: white; border: none; box-shadow: 0 6px 14px rgba(210,50,70,0.3); }
  .confirm-btn:active { transform: scale(0.92); }

  /* ===== PROFESSIONAL COMING SOON MODAL with extra details ===== */
  .comingsoon-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10, 30, 60, 0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 400;
    backdrop-filter: blur(8px);
  }
  .comingsoon-card {
    background: linear-gradient(145deg, #ffffff, #f5fbff);
    padding: 2.2rem 2.2rem 2rem;
    border-radius: 48px;
    width: 360px;
    text-align: center;
    box-shadow: 0 40px 70px -10px #0a2a66, 0 0 0 1px rgba(255,255,255,0.5) inset;
    animation: floatPro 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.1);
    border: 1px solid rgba(70, 130, 240, 0.3);
  }
  @keyframes floatPro {
    0% { opacity: 0; transform: scale(0.7) translateY(40px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  .comingsoon-icon {
    width: 64px;
    height: 64px;
    background: #e8f0fe;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1rem;
    font-size: 2rem;
    box-shadow: 0 6px 14px rgba(0,70,150,0.15);
  }
  .comingsoon-card h3 {
    color: #0a2a5e;
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    letter-spacing: -0.5px;
  }
  .comingsoon-sub {
    color: #2563eb;
    font-weight: 600;
    font-size: 1rem;
    margin-bottom: 1.5rem;
    background: #ddeaff;
    padding: 0.3rem 1rem;
    border-radius: 60px;
    display: inline-block;
  }
  .feature-grid {
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
    margin: 1.5rem 0;
    text-align: left;
    background: #f6fbff;
    padding: 1rem 1.2rem;
    border-radius: 32px;
    border: 1px solid #cfe2fd;
  }
  .feature-row {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #1e3f6e;
    font-weight: 500;
    font-size: 0.95rem;
  }
  .feature-row svg {
    width: 22px;
    height: 22px;
    stroke: #2563eb;
    stroke-width: 2;
    fill: none;
  }
  .soon-note {
    color: #647eaa;
    font-size: 0.8rem;
    margin-top: 1rem;
    font-weight: 400;
  }
  .comingsoon-card button {
    background: #0a2a5e;
    border: none;
    color: white;
    padding: 0.9rem 2rem;
    border-radius: 60px;
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
    margin-top: 1rem;
    width: 100%;
    box-shadow: 0 10px 20px -5px #0a2a66;
    transition: 0.1s;
  }
  .comingsoon-card button:active { transform: scale(0.94); background: #1e3f7a; }
</style>
</head>
<body>

<div class="header">⭐ Saved Questions</div>
<div class="container" id="list"></div>

<!-- confirm dialog (delete) -->
<div class="confirm-overlay" id="confirmDialog">
  <div class="confirm-box">
    <p>🗑️ delete this saved question?</p>
    <div class="confirm-actions">
      <button class="confirm-btn cancel" id="confirmCancel">cancel</button>
      <button class="confirm-btn delete" id="confirmDelete">delete</button>
    </div>
  </div>
</div>

<!-- PROFESSIONAL COMING SOON MODAL with extra details -->
<div class="comingsoon-overlay" id="comingSoonModal">
  <div class="comingsoon-card">
    <div class="comingsoon-icon">✨</div>
    <h3>Coming soon</h3>
    <div class="comingsoon-sub">edit & VVI features</div>
    <div class="feature-grid">
      <div class="feature-row">
        <svg viewBox="0 0 24 24"><path d="M20 14.66V20a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h5.34"/><polygon points="18 2 22 6 12 16 8 16 8 12 18 2"/></svg>
        <span>Edit question text & options</span>
      </div>
      <div class="feature-row">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span>Mark as VVI (very very important)</span>
      </div>
      <div class="feature-row">
        <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span>Priority badge & revision alerts</span>
      </div>
    </div>
    <div class="soon-note">🔧 these features are under active development</div>
    <button id="closeComingSoon">got it</button>
  </div>
</div>

<!-- toast container -->
<div class="toast-container" id="toastContainer"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
  import { getDatabase, ref, onValue, remove, set } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-database.js";

  const config = {
    apiKey: "AIzaSyCy1r8BXbe-W9UBsCrFDFgkHy-j7lYFwYg",
    databaseURL: "https://mmpublicschoolmundeshwar-233a4-default-rtdb.firebaseio.com"
  };

  const app = initializeApp(config);
  const db = getDatabase(app);

  const userId = localStorage.getItem("userId");
  const list = document.getElementById("list");

  // loading state
  list.innerHTML = `
    <div class="loading-block">
      <div class="spinner"></div>
      <div class="loading-text">loading saved questions ...</div>
    </div>
  `;

  // toast
  const toastContainer = document.getElementById('toastContainer');
  function showToast(msg, icon = '⭐', duration = 2000) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
    toastContainer.innerHTML = '';
    toastContainer.appendChild(toast);
    setTimeout(() => { toastContainer.innerHTML = ''; }, duration);
  }

  // confirm dialog
  const confirmOverlay = document.getElementById('confirmDialog');
  const confirmCancel = document.getElementById('confirmCancel');
  const confirmDelete = document.getElementById('confirmDelete');
  let pendingDeleteId = null;

  function showConfirm(id) { pendingDeleteId = id; confirmOverlay.style.display = 'flex'; }
  function hideConfirm() { confirmOverlay.style.display = 'none'; pendingDeleteId = null; }

  confirmCancel.addEventListener('click', hideConfirm);
  confirmDelete.addEventListener('click', async () => {
    if (pendingDeleteId) {
      await remove(ref(db, "savedCards/" + userId + "/" + pendingDeleteId));
      showToast('deleted permanently', '🗑️');
      hideConfirm();
    }
  });
  confirmOverlay.addEventListener('click', (e) => { if (e.target === confirmOverlay) hideConfirm(); });

  // coming soon modal (with extra details)
  const comingSoonModal = document.getElementById('comingSoonModal');
  const closeComingSoon = document.getElementById('closeComingSoon');
  function showComingSoon() {
    comingSoonModal.style.display = 'flex';
  }
  closeComingSoon.addEventListener('click', () => {
    comingSoonModal.style.display = 'none';
  });
  comingSoonModal.addEventListener('click', (e) => {
    if (e.target === comingSoonModal) comingSoonModal.style.display = 'none';
  });

  // menu toggle
  window.toggleMenu = (id) => {
    document.querySelectorAll(".menuBox").forEach(m => { if (m.id !== 'menu_' + id) m.style.display = "none"; });
    const box = document.getElementById("menu_" + id);
    if (box) box.style.display = box.style.display === "flex" ? "none" : "flex";
  };

  // REAL LIKE / UNLIKE (toggle) with card class update instantly
  window.likeSave = async (id) => {
    const cardEl = document.getElementById('card_' + id);
    const likeRef = ref(db, `savedCards/${userId}/${id}/likedBy/${userId}`);
    
    // get current like status from firebase (or use class to determine)
    const snapshot = await new Promise((resolve) => {
      onValue(ref(db, `savedCards/${userId}/${id}/likedBy`), (s) => resolve(s), { onlyOnce: true });
    });
    const isLiked = snapshot.exists() && snapshot.val()[userId] ? true : false;

    if (isLiked) {
      // unlike: remove entry
      await set(likeRef, null);
      if (cardEl) cardEl.classList.remove('liked');
      showToast('removed from liked', '♡');
    } else {
      // like: set true
      await set(likeRef, true);
      if (cardEl) cardEl.classList.add('liked');
      showToast('added to liked', '❤️');
    }
    document.getElementById("menu_" + id).style.display = "none";
  };

  window.shareSave = (id, questionText) => {
    const txt = `📌 saved question: ${questionText}`;
    if (navigator.share) {
      navigator.share({ text: txt }).catch(() => showToast('share cancelled', ''));
    } else {
      navigator.clipboard?.writeText(txt).then(() => showToast('copied to clipboard', '📋'));
    }
    document.getElementById("menu_" + id).style.display = "none";
  };

  window.delSave = (id) => {
    document.getElementById("menu_" + id).style.display = "none";
    showConfirm(id);
  };

  window.editSave = (id) => { showComingSoon(); document.getElementById("menu_" + id).style.display = "none"; };
  window.vviSave = (id) => { showComingSoon(); document.getElementById("menu_" + id).style.display = "none"; };

  // Firebase listener
  onValue(ref(db, "savedCards/" + userId), (snap) => {
    if (!snap.exists()) {
      list.innerHTML = "<div class='card' style='text-align:center; color:#47648b;'>📭 no saved questions</div>";
      return;
    }

    let html = '';
    Object.entries(snap.val()).reverse().forEach(([key, d]) => {
      const isMine = d.ownerUid === userId;

      let opts = '';
      (d.options || []).forEach(op => {
        let cls = "opt";
        if (op === d.correct) cls += " correct";
        if (op === d.your) cls += " your";
        opts += `<div class="${cls}">${op}</div>`;
      });

      // liked status
      const likedByUser = d.likedBy && d.likedBy[userId] ? true : false;
      const likedClass = likedByUser ? 'liked' : '';

      // timestamp (use savedAt or fallback)
      const timeStr = d.savedAt ? d.savedAt : new Date().toLocaleString();

      // icons
      const shareIcon = `<svg class="menu-icon" viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>`;
      const likeIcon = `<svg class="menu-icon" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
      const deleteIcon = `<svg class="menu-icon" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>`;
      const editIcon = `<svg class="menu-icon" viewBox="0 0 24 24"><path d="M20 14.66V20a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h5.34"/><polygon points="18 2 22 6 12 16 8 16 8 12 18 2"/></svg>`;
      const vviIcon = `<svg class="menu-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;

      html += `
        <div class="card ${likedClass}" id="card_${key}">
          <div class="owner">
            <div class="owner-left">
              <img src="${d.ownerPhoto || 'https://via.placeholder.com/40'}" crossorigin="anonymous">
              <div class="owner-name">${d.ownerName || 'student'}</div>
            </div>
            <div style="position:relative;">
              <div class="menuBtn" onclick="toggleMenu('${key}')">⋮</div>
              <div class="menuBox" id="menu_${key}">
                <button onclick="shareSave('${key}', '${d.question.replace(/'/g, "\\'")}')">${shareIcon} Share</button>
                <button onclick="likeSave('${key}')">${likeIcon} ${likedByUser ? 'Unlike' : 'Like'}</button>
                <button onclick="editSave('${key}')">${editIcon} Edit <span class="new-badge">new</span></button>
                <button onclick="vviSave('${key}')">${vviIcon} VVI <span class="new-badge">new</span></button>
                <button onclick="delSave('${key}')">${deleteIcon} Delete</button>
              </div>
            </div>
          </div>

          ${!isMine ? `<div class="warn">⚠️ you cannot edit this</div>` : ''}

          <div class="q">${(d.qIndex !== undefined ? d.qIndex+1 : '')}. ${d.question || ''}</div>
          ${opts}

          <!-- timestamp at bottom, small & distinct -->
          <div class="timestamp-bottom">
            <svg class="timestamp-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ${timeStr}
          </div>
        </div>
      `;
    });

    list.innerHTML = html;
  });

  // close menus on outside click
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.menuBtn') && !e.target.closest('.menuBox')) {
      document.querySelectorAll(".menuBox").forEach(m => m.style.display = "none");
    }
  });

</script>
</body>
</html>
