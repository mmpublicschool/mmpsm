<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Master Admin Panel</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Segoe UI',sans-serif;
background:#eef3f9;
padding:20px;
}

/* HEADER */
.header{
background:linear-gradient(135deg,#0a2a66,#1e4b8f);
color:white;
padding:18px 25px;
border-radius:12px;
font-weight:800;
margin-bottom:25px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.header h2{
font-size:20px;
}

/* CARD */
.card{
background:white;
border-radius:18px;
padding:20px;
margin-bottom:25px;
box-shadow:0 15px 35px rgba(0,0,0,0.12);
position:relative;
border-left:8px solid #0a2a66;
}

/* RANK BADGE */
.rank{
position:absolute;
top:15px;
right:15px;
background:#ffd700;
color:#000;
padding:6px 14px;
border-radius:30px;
font-weight:800;
font-size:13px;
}

/* PROFILE */
.profile{
display:flex;
gap:18px;
margin-bottom:18px;
}

.profile img{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
border:4px solid #0a2a66;
}

.profile-info h3{
color:#0a2a66;
margin-bottom:6px;
}

.subject{
display:inline-block;
background:#0a2a66;
color:white;
padding:5px 12px;
border-radius:20px;
font-size:13px;
font-weight:700;
}

/* DETAILS GRID */
.details{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
font-size:13px;
margin-top:10px;
}

.box{
background:#f0f4ff;
padding:8px 12px;
border-radius:8px;
font-weight:600;
}

/* ABOUT */
.about{
margin-top:12px;
background:#f9f9f9;
padding:10px 14px;
border-radius:10px;
font-size:13px;
color:#333;
}

/* PASSWORD */
.password-box{
display:flex;
align-items:center;
gap:6px;
}

.password-box input{
border:none;
background:transparent;
font-weight:600;
width:100%;
}

.password-box button{
border:none;
background:none;
cursor:pointer;
color:#0a2a66;
font-size:14px;
}

.footer{
text-align:center;
font-size:12px;
margin-top:30px;
color:#666;
}
</style>
</head>

<body>

<div class="header">
<h2>🏛 Teacher Master Admin Dashboard</h2>
</div>

<div id="teacherList"></div>

<div class="footer">
© 2026 M.M Public School Mundeshwari
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyAHAQjn4sTuR9FiGF3ljRrFEMZQjsx-SHg",
databaseURL:"https://apni-duniya-b53d7-default-rtdb.firebaseio.com",
projectId:"apni-duniya-b53d7"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const list=document.getElementById("teacherList");

async function loadTeachers(){

const teacherSnap=await get(ref(db,"teachers"));
const ratingSnap=await get(ref(db,"teacherRatings"));

if(!teacherSnap.exists()){
list.innerHTML="<h3>No Teachers Found</h3>";
return;
}

let teachers=[];

teacherSnap.forEach(child=>{
const id=child.key;
const data=child.val();

let total=0;
let count=0;

if(ratingSnap.exists() && ratingSnap.child(id).exists()){
ratingSnap.child(id).forEach(r=>{
total+=r.val().rating;
count++;
});
}

teachers.push({
id:id,
teacherId:data.teacherId || "N/A",
schoolId:data.schoolId || "N/A",
name:data.name,
subject:data.subject,
username:data.username,
password:data.password,
email:data.email || "N/A",
phone:data.phone || "N/A",
about:data.about || "No About Info",
joining:data.joiningDate || "N/A",
photo:data.photoURL || "https://via.placeholder.com/120",
total:total,
count:count,
avg:count?(total/count):0
});
});

/* Sort by avg rating */
teachers.sort((a,b)=>b.avg-a.avg);

list.innerHTML="";

teachers.forEach((t,index)=>{

list.innerHTML+=`
<div class="card">

<div class="rank">Rank #${index+1}</div>

<div class="profile">
<img src="${t.photo}">
<div class="profile-info">
<h3>${t.name}</h3>
<div class="subject">${t.subject}</div>
</div>
</div>

<div class="details">

<div class="box">Teacher ID: ${t.teacherId}</div>
<div class="box">School ID: ${t.schoolId}</div>
<div class="box">Username: ${t.username}</div>

<div class="box password-box">
<input type="password" value="${t.password}" id="pass${index}" readonly>
<button onclick="togglePass(${index})">
<i class="fa-solid fa-eye"></i>
</button>
</div>

<div class="box">Email: ${t.email}</div>
<div class="box">Phone: ${t.phone}</div>
<div class="box">Joining Date: ${t.joining}</div>
<div class="box">Reviews: ${t.count}</div>
<div class="box">Average Rating: ⭐ ${t.avg.toFixed(1)}</div>
<div class="box">Total Stars: ${t.total}</div>

</div>

<div class="about">
<strong>About Me:</strong><br>
${t.about}
</div>

</div>
`;

});

}

window.togglePass=function(i){
const field=document.getElementById("pass"+i);
if(field.type==="password"){
field.type="text";
}else{
field.type="password";
}
}

loadTeachers();

</script>

</body>
</html>
