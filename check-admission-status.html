            height: 50px;

            border-top: 4px solid #2563eb;
            border-radius: 50%;

            margin: 0 auto 20px;

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }

        /* Status Result */

            padding: 30px;
            display: none;
        }

        .status-result.active {
            display: block;
        }

            margin-bottom: 25px;

            animation: slideDown 0.5s ease;

            from { transform: translateY(-20px); opacity: 0; }

            font-size: 2rem;

            font-size: 1.2rem;

        async function loadFromFirebase() {
            try {
                // Load applications
                const appsRef = window.firebaseRef(window.firebaseDatabase, 'applications');
                const appsSnapshot = await window.firebaseGet(appsRef);
                
                if (appsSnapshot.exists()) {
                    const data = appsSnapshot.val();
                    applications = [];
                    Object.keys(data).forEach(key => {
                        applications.push({
                            firebaseKey: key,
                            ...data[key]
                        });
                    });
                    console.log('Loaded applications:', applications);

                    console.log('No data in Firebase, loading sample data');

                // Load field verification
                const verifyRef = window.firebaseRef(window.firebaseDatabase, 'fieldVerification');
                const verifySnapshot = await window.firebaseGet(verifyRef);
                
                if (verifySnapshot.exists()) {
                    fieldVerification = verifySnapshot.val();
                } else {
                    loadSampleVerification();
                }
            } catch (error) {
                console.error('Error loading from Firebase:', error);
                loadSampleData();

        // Search Application

                    icon: 'error',
                    confirmButtonColor: '#2563eb'
                });
                return;
            }

            // Show loading
            document.getElementById('loading').classList.add('active');
            document.getElementById('statusResult').classList.remove('active');

            // Try to load from Firebase first
            await loadFromFirebase();

            // Find application by registrationId (new) or applicationId (old for compatibility)
            const app = applications.find(a => a.registrationId === appId || a.applicationId === appId);
            
            // Hide loading
            document.getElementById('loading').classList.remove('active');
            
            if (app) {
                displayApplicationStatus(app);
            } else {
                showNotFound();
            }
        }

        // Display Application Status - UPDATED with proper field status colors
        function displayApplicationStatus(app) {
            const resultDiv = document.getElementById('statusResult');
            resultDiv.classList.add('active');

            const verification = fieldVerification[app.firebaseKey] || {};
            
            // Function to get field status badge with proper color
            function getFieldStatusBadge(fieldName) {
                const status = verification[fieldName] || 'pending';
                let badgeClass = '';
                let statusText = '';
                
                switch(status) {
                    case 'approved':
                        badgeClass = 'field-status-approved';
                        statusText = '✓ Approved';
                        break;
                    case 'rejected':
                        badgeClass = 'field-status-rejected';
                        statusText = '✗ Rejected';
                        break;
                    default:
                        badgeClass = 'field-status-pending';
                        statusText = '⏳ Pending';
                }
                
                return `<span class="field-status-badge ${badgeClass}">${statusText}</span>`;
            }

            function getStatusBadge(status) {
                const badges = {
                    'pending': 'badge-pending',
                    'approved': 'badge-approved',
                    'rejected': 'badge-rejected',
                    'completed': 'badge-approved',
                    'partial': 'badge-partial'
                };
                return `<span class="badge ${badges[status] || 'badge-pending'}">${status}</span>`;
            }

            function getValue(value) {
                return value && value.toString().trim() !== '' ? value : '<span class="field-value empty">Not Provided</span>';
            }

            // Calculate verification summary
            const verificationValues = Object.values(verification).filter(v => v !== 'overall');
            const approvedCount = verificationValues.filter(v => v === 'approved').length;
            const pendingCount = verificationValues.filter(v => v === 'pending').length;
            const rejectedCount = verificationValues.filter(v => v === 'rejected').length;
            const totalFields = verificationValues.length;

            // Check if admission is FULLY COMPLETED by admin
            const isFullyCompleted = app.status === 'approved' && 
                                     app.paymentStatus === 'completed' && 
                                     app.adminOnly?.fullyVerified === true;

            const allocatedClass = app.adminOnly?.allocatedClass || '1';
            const section = app.adminOnly?.section || 'A';

            let html = '';

            // Show appropriate message based on status

                        <i class="fas fa-check-circle" style="font-size: 4rem; margin-bottom: 15px;"></i>
                        <h2>🎉 Admission Successful! 🎉</h2>

                        <div class="class-box">
                            <i class="fas fa-school"></i> Class ${allocatedClass}-${section}
                        </div>
                        <p style="margin-top: 15px; font-size: 1rem;">
                            <strong>Student Unique ID:</strong> ${app.adminOnly?.studentUniqueId || 'Not Assigned'}<br>
                            <strong>Roll Number:</strong> ${app.adminOnly?.rollNumber || 'Not Assigned'}
                        </p>
                        <p style="margin-top: 10px; font-size: 0.9rem;">
                            Approved on: ${app.adminOnly?.approvalDate ? new Date(app.adminOnly.approvalDate).toLocaleDateString() : 'N/A'}
                        </p>
                    </div>

            } else if (app.status === 'rejected') {
                // REJECTED MESSAGE
                html += `
                    <div class="rejected-message">
                        <i class="fas fa-times-circle" style="font-size: 4rem; margin-bottom: 15px;"></i>
                        <h2>Application Rejected</h2>
                        <p>We regret to inform you that your application has been rejected.</p>
                        <p style="margin-top: 15px; font-size: 1rem;">
                            Reason: ${app.adminOnly?.rejectedReason || 'Incomplete or incorrect information'}
                        </p>
                        <p style="margin-top: 10px; font-size: 0.9rem;">
                            Please contact the school administration for more details.
                        </p>
                    </div>
                `;
            } else if (app.status === 'pending' || app.paymentStatus !== 'completed') {
                // PENDING MESSAGE

                    <div class="pending-message">
                        <i class="fas fa-clock" style="font-size: 4rem; margin-bottom: 15px;"></i>
                        <h2>Application Under Review</h2>

                </div>

                <!-- Student Details -->

                    </div>
                    <div class="section-content">
                        <div class="fields-grid">
                            ${Object.entries(app.studentDetails || {}).map(([key, value]) => `

                                        ${key.replace(/([A-Z])/g, ' $1').replace(/^./, str => str.toUpperCase())}
                                    </div>
                                    <div class="field-value">${getValue(value)}</div>
                                    <div class="field-verification">
                                        ${getFieldStatusBadge(key)}

                <!-- Parent Details -->

                </div>

                <!-- Transport -->
                <div class="section-card">
                    <div class="section-header">
                        <i class="fas fa-bus"></i>
                        <h3>Transport</h3>
                    </div>
                    <div class="section-content">
                        <div class="fields-grid">
                            ${Object.entries(app.transportDetails || {}).map(([key, value]) => `
                                <div class="field-item">
                                    <div class="field-label">
                                        ${key.replace(/([A-Z])/g, ' $1').replace(/^./, str => str.toUpperCase())}
                                    </div>
                                    <div class="field-value">${getValue(value)}</div>
                                    <div class="field-verification">
                                        ${getFieldStatusBadge(key)}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>

                <!-- Documents -->
                <div class="section-card">
                    <div class="section-header">
                        <i class="fas fa-link"></i>
                        <h3>Uploaded Documents</h3>
                    </div>
                    <div class="section-content">
                        <div class="documents-grid">
                            ${Object.entries(app.documentLinks || {}).map(([key, value]) => {
                                if (!value) return '';
                                const fileExtension = value.split('.').pop()?.toUpperCase() || 'PDF';
                                return `
                                    <div class="document-item">
                                        <div class="document-icon">
                                            <i class="fas fa-file-${fileExtension === 'PDF' ? 'pdf' : 'image'}"></i>
                                        </div>
                                        <div class="document-info">
                                            <div class="document-name">${key.replace(/([A-Z])/g, ' $1').replace(/^./, str => str.toUpperCase())}</div>
